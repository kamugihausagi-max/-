<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>単語帳</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="VOCAB">
<meta name="theme-color" content="#3a6b4a">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f4ef; --bg2: #eeeae3; --surface: #ffffff;
    --border: #ddd9d1; --border2: #c8c3ba;
    --accent: #3a6b4a; --accent-light: #e8f0eb; --accent2: #2e5439;
    --red: #b84040; --red-light: #fdf0f0;
    --green: #3a6b4a; --green-light: #e8f0eb;
    --text: #1e1e1e; --text2: #555; --muted: #999;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 60px; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100; }
  .logo { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 700; color: var(--accent); letter-spacing: 3px; }
  .nav-tabs { display: flex; gap: 4px; }
  .tab-btn { background: none; border: none; color: var(--muted); padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 13px; font-family: inherit; font-weight: 500; transition: all 0.18s; }
  .tab-btn.active { background: var(--accent-light); color: var(--accent); }
  main { flex: 1; padding: 28px 20px; max-width: 680px; width: 100%; margin: 0 auto; }
  #view-list { display: block; } #view-card { display: none; }
  .add-form { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: var(--shadow); }
  .form-title { font-size: 11px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
  .form-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .form-row input { flex: 1; min-width: 130px; background: var(--bg); border: 1.5px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 10px; font-size: 14px; font-family: inherit; outline: none; }
  .form-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(58,107,74,0.1); }
  .form-row input::placeholder { color: var(--muted); }
  .btn-add { background: var(--accent); color: #fff; border: none; padding: 10px 22px; border-radius: 10px; font-weight: 500; cursor: pointer; font-size: 14px; font-family: inherit; white-space: nowrap; }
  .stats-bar { display: flex; align-items: center; margin-bottom: 14px; padding: 0 2px; }
  .stat { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
  .stat-num { color: var(--accent); font-weight: 600; font-size: 14px; }
  .word-list { display: flex; flex-direction: column; gap: 8px; }
  .word-item { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; box-shadow: var(--shadow); }
  .word-info { flex: 1; }
  .word-en { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; color: var(--text); }
  .word-ja { font-size: 13px; color: var(--text2); margin-top: 2px; }
  .word-note { font-size: 11px; color: var(--muted); margin-top: 2px; font-style: italic; }
  .btn-del { background: none; border: 1.5px solid var(--border); color: var(--muted); width: 30px; height: 30px; border-radius: 8px; cursor: pointer; font-size: 13px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .empty-state { text-align: center; padding: 56px 0; color: var(--muted); font-size: 14px; line-height: 2; }
  .empty-icon { font-size: 36px; margin-bottom: 10px; }
  .mode-toggle { display: flex; gap: 8px; margin-bottom: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 5px; box-shadow: var(--shadow); }
  .mode-btn { flex: 1; padding: 9px; border-radius: 8px; border: none; background: none; color: var(--muted); font-size: 13px; cursor: pointer; font-family: inherit; font-weight: 500; }
  .mode-btn.active { background: var(--accent); color: #fff; }
  .progress-wrap { margin-bottom: 6px; }
  .progress-bar { background: var(--bg2); border-radius: 99px; height: 5px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #5a9b6e); border-radius: 99px; transition: width 0.35s ease; }
  .card-counter { text-align: right; font-size: 12px; color: var(--muted); margin-top: 5px; margin-bottom: 20px; }
  /* カード: アニメーションなし、display切り替えのみ */
  .card-wrap { margin: 0 auto 24px; width: 100%; max-width: 500px; height: 240px; cursor: pointer; position: relative; }
  .card-face { position: absolute; inset: 0; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 36px; text-align: center; }
  .card-front { background: var(--surface); border: 1.5px solid var(--border); box-shadow: var(--shadow-lg); }
  .card-front::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--accent), #7bbf90); border-radius: 20px 20px 0 0; }
  .card-back { background: var(--surface); border: 1.5px solid var(--accent); box-shadow: var(--shadow-lg); display: none; }
  .card-back::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #5a9b6e, var(--accent)); border-radius: 20px 20px 0 0; }
  .card-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; font-weight: 500; }
  .card-main { font-family: 'Cormorant Garamond', serif; font-size: 40px; font-weight: 600; color: var(--text); line-height: 1.2; word-break: break-word; }
  .card-sub { font-size: 14px; color: var(--text2); margin-top: 10px; }
  .card-hint { font-size: 12px; color: var(--muted); margin-top: 20px; }
  .card-controls { display: flex; justify-content: center; gap: 14px; margin-bottom: 8px; }
  .btn-result { flex: 1; max-width: 200px; padding: 13px 20px; border-radius: 12px; font-size: 14px; cursor: pointer; font-family: inherit; font-weight: 500; border: 1.5px solid; }
  .btn-ng { background: var(--red-light); border-color: #e8a0a0; color: var(--red); }
  .btn-ok { background: var(--green-light); border-color: #96c4a5; color: var(--green); }
  .result-wrap { max-width: 440px; margin: 16px auto 0; }
  .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 36px 32px; text-align: center; box-shadow: var(--shadow-lg); }
  .result-emoji { font-size: 40px; margin-bottom: 12px; }
  .result-title { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .result-score { font-size: 52px; font-weight: 300; font-family: 'Cormorant Garamond', serif; color: var(--accent); line-height: 1.1; margin-bottom: 4px; }
  .result-detail { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
  .result-actions { display: flex; flex-direction: column; gap: 10px; }
  .btn-restart { background: var(--accent); color: #fff; border: none; padding: 13px 32px; border-radius: 11px; font-size: 14px; cursor: pointer; font-family: inherit; font-weight: 500; }
  .btn-retry-ng { background: var(--red-light); color: var(--red); border: 1.5px solid #e8a0a0; padding: 12px 32px; border-radius: 11px; font-size: 14px; cursor: pointer; font-family: inherit; font-weight: 500; }
  .btn-retry-ng:disabled { opacity: 0.4; cursor: default; pointer-events: none; }
  .wrong-section { margin-top: 20px; text-align: left; border-top: 1px solid var(--border); padding-top: 16px; }
  .wrong-section-title { font-size: 10px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .wrong-item { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--bg2); }
  .wrong-item-en { font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 600; color: var(--red); }
  .wrong-item-ja { font-size: 12px; color: var(--muted); }
  .no-words { text-align: center; padding: 64px 0; color: var(--muted); line-height: 2.4; }
  .no-words-icon { font-size: 40px; margin-bottom: 8px; }
  @media (max-width: 480px) { .form-row { flex-direction: column; } .card-main { font-size: 32px; } .result-card { padding: 28px 20px; } }
</style>
</head>
<body>
<header>
  <div class="logo">VOCAB</div>
  <div class="nav-tabs">
    <button class="tab-btn active" onclick="showView('list')">単語帳</button>
    <button class="tab-btn" onclick="showView('card')">学習する</button>
  </div>
</header>
<main>
  <div id="view-list">
    <div class="add-form">
      <div class="form-title">新しい単語を追加</div>
      <div class="form-row">
        <input type="text" id="inp-en" placeholder="英語（例: apple）">
        <input type="text" id="inp-ja" placeholder="日本語（例: りんご）">
        <input type="text" id="inp-note" placeholder="メモ（任意）">
        <button class="btn-add" onclick="addWord()">＋ 追加</button>
      </div>
    </div>
    <div class="stats-bar">
      <div class="stat">登録 <span class="stat-num" id="stat-total">0</span> 語</div>
    </div>
    <div class="word-list" id="word-list">
      <div class="empty-state"><div class="empty-icon">📖</div>まだ単語が登録されていません<br>上のフォームから追加してみましょう</div>
    </div>
  </div>
  <div id="view-card">
    <div id="no-words-msg" class="no-words" style="display:none">
      <div class="no-words-icon">📝</div>単語が登録されていません<br>単語帳タブから追加してください
    </div>
    <div id="card-study" style="display:none">
      <div class="mode-toggle">
        <button class="mode-btn active" id="mode-en" onclick="setMode('en')">英語 → 日本語</button>
        <button class="mode-btn" id="mode-ja" onclick="setMode('ja')">日本語 → 英語</button>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
      </div>
      <div class="card-counter" id="card-counter">1 / 1</div>
      <div class="card-wrap" id="card-wrap" onclick="flipCard()">
        <div class="card-face card-front" id="card-front">
          <div class="card-label" id="front-label">ENGLISH</div>
          <div class="card-main" id="front-text"></div>
          <div class="card-hint">✦ タップして答えを確認</div>
        </div>
        <div class="card-face card-back" id="card-back">
          <div class="card-label" id="back-label">JAPANESE</div>
          <div class="card-main" id="back-text"></div>
          <div class="card-sub" id="back-note"></div>
        </div>
      </div>
      <div class="card-controls" id="card-controls" style="display:none">
        <button class="btn-result btn-ng" onclick="judge(false)">✕ もう一度</button>
        <button class="btn-result btn-ok" onclick="judge(true)">○ 覚えた！</button>
      </div>
    </div>
    <div id="result-view" style="display:none">
      <div class="result-wrap">
        <div class="result-card">
          <div class="result-emoji" id="res-emoji">🎉</div>
          <div class="result-title">結果</div>
          <div class="result-score" id="res-score">0 / 0</div>
          <div class="result-detail" id="res-detail">正解率 0%</div>
          <div class="result-actions">
            <button class="btn-retry-ng" id="btn-retry-ng" onclick="retryWrong()">✕ 覚えていない単語だけもう一度</button>
            <button class="btn-restart" onclick="restartStudy()">↺ 全部もう一度</button>
          </div>
          <div class="wrong-section" id="wrong-section" style="display:none">
            <div class="wrong-section-title">覚えていない単語</div>
            <div id="wrong-items"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>
<script>
  let words = JSON.parse(localStorage.getItem('vocab_words') || '[]');
  let studyQueue = [], currentIdx = 0, isFlipped = false;
  let correct = 0, wrongWords = [], mode = 'en', judging = false;

  function save() { localStorage.setItem('vocab_words', JSON.stringify(words)); }

  function showView(v) {
    document.getElementById('view-list').style.display = v === 'list' ? 'block' : 'none';
    document.getElementById('view-card').style.display = v === 'card' ? 'block' : 'none';
    document.querySelectorAll('.tab-btn').forEach((b, i) =>
      b.classList.toggle('active', (i===0 && v==='list') || (i===1 && v==='card')));
    if (v === 'card') initStudy();
  }

  function addWord() {
    const en = document.getElementById('inp-en').value.trim();
    const ja = document.getElementById('inp-ja').value.trim();
    const note = document.getElementById('inp-note').value.trim();
    if (!en || !ja) { alert('英語と日本語を入力してください'); return; }
    words.push({ en, ja, note, id: Date.now() });
    save();
    ['inp-en','inp-ja','inp-note'].forEach(id => document.getElementById(id).value = '');
    renderList();
  }

  function deleteWord(id) {
    if (!confirm('削除しますか？')) return;
    words = words.filter(w => w.id !== id);
    save(); renderList();
  }

  function renderList() {
    const list = document.getElementById('word-list');
    document.getElementById('stat-total').textContent = words.length;
    if (!words.length) {
      list.innerHTML = '<div class="empty-state"><div class="empty-icon">📖</div>まだ単語が登録されていません<br>上のフォームから追加してみましょう</div>';
      return;
    }
    list.innerHTML = [...words].reverse().map(w => `
      <div class="word-item">
        <div class="word-info">
          <div class="word-en">${esc(w.en)}</div>
          <div class="word-ja">${esc(w.ja)}</div>
          ${w.note ? `<div class="word-note">${esc(w.note)}</div>` : ''}
        </div>
        <button class="btn-del" onclick="deleteWord(${w.id})">✕</button>
      </div>`).join('');
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function setMode(m) {
    mode = m;
    document.getElementById('mode-en').classList.toggle('active', m==='en');
    document.getElementById('mode-ja').classList.toggle('active', m==='ja');
    initStudy();
  }

  function initStudy() {
    document.getElementById('result-view').style.display = 'none';
    if (!words.length) {
      document.getElementById('no-words-msg').style.display = 'block';
      document.getElementById('card-study').style.display = 'none';
      return;
    }
    document.getElementById('no-words-msg').style.display = 'none';
    document.getElementById('card-study').style.display = 'block';
    studyQueue = shuffle([...words]);
    currentIdx = correct = 0;
    wrongWords = []; judging = false;
    showCard();
  }

  function shuffle(arr) {
    for (let i = arr.length-1; i > 0; i--) {
      const j = Math.floor(Math.random()*(i+1));
      [arr[i],arr[j]] = [arr[j],arr[i]];
    }
    return arr;
  }

  function showCard() {
    const w = studyQueue[currentIdx];
    isFlipped = false; judging = false;
    // アニメーションなし・display切り替えのみ
    document.getElementById('card-front').style.display = 'flex';
    document.getElementById('card-back').style.display = 'none';
    if (mode === 'en') {
      document.getElementById('front-label').textContent = 'ENGLISH';
      document.getElementById('front-text').textContent = w.en;
      document.getElementById('back-label').textContent = 'JAPANESE';
      document.getElementById('back-text').textContent = w.ja;
    } else {
      document.getElementById('front-label').textContent = 'JAPANESE';
      document.getElementById('front-text').textContent = w.ja;
      document.getElementById('back-label').textContent = 'ENGLISH';
      document.getElementById('back-text').textContent = w.en;
    }
    document.getElementById('back-note').textContent = w.note || '';
    document.getElementById('card-controls').style.display = 'none';
    const total = studyQueue.length;
    document.getElementById('card-counter').textContent = `${currentIdx+1} / ${total}`;
    document.getElementById('prog-fill').style.width = `${(currentIdx/total)*100}%`;
  }

  function flipCard() {
    if (isFlipped) return;
    isFlipped = true;
    document.getElementById('card-front').style.display = 'none';
    document.getElementById('card-back').style.display = 'flex';
    document.getElementById('card-controls').style.display = 'flex';
  }

  function judge(ok) {
    if (judging) return;
    judging = true;
    if (ok) correct++;
    else wrongWords.push(studyQueue[currentIdx]);
    currentIdx++;
    if (currentIdx >= studyQueue.length) showResult();
    else showCard();
  }

  function showResult() {
    document.getElementById('card-study').style.display = 'none';
    document.getElementById('result-view').style.display = 'block';
    const total = studyQueue.length;
    const pct = Math.round((correct/total)*100);
    document.getElementById('res-score').textContent = `${correct} / ${total}`;
    document.getElementById('res-detail').textContent = `正解率 ${pct}%`;
    document.getElementById('prog-fill').style.width = '100%';
    document.getElementById('card-counter').textContent = `${total} / ${total}`;
    document.getElementById('res-emoji').textContent =
      pct === 100 ? '🏆' : pct >= 70 ? '🎉' : pct >= 40 ? '📚' : '💪';
    const btn = document.getElementById('btn-retry-ng');
    if (!wrongWords.length) {
      btn.disabled = true;
      btn.textContent = '全問正解！';
    } else {
      btn.disabled = false;
      btn.textContent = `✕ 覚えていない ${wrongWords.length} 語をもう一度`;
    }
    if (wrongWords.length) {
      document.getElementById('wrong-section').style.display = 'block';
      document.getElementById('wrong-items').innerHTML = wrongWords.map(w => `
        <div class="wrong-item">
          <span class="wrong-item-en">${esc(w.en)}</span>
          <span class="wrong-item-ja">${esc(w.ja)}</span>
        </div>`).join('');
    } else {
      document.getElementById('wrong-section').style.display = 'none';
    }
  }

  function retryWrong() {
    if (!wrongWords.length) return;
    studyQueue = shuffle([...wrongWords]);
    currentIdx = correct = 0;
    wrongWords = []; judging = false;
    document.getElementById('result-view').style.display = 'none';
    document.getElementById('card-study').style.display = 'block';
    showCard();
  }

  function restartStudy() {
    document.getElementById('result-view').style.display = 'none';
    initStudy();
  }

  document.getElementById('inp-note').addEventListener('keydown', e => {
    if (e.key === 'Enter') addWord();
  });

  renderList();
</script>
</body>
</html>
